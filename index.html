<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI 일기장</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Nanum+Pen+Script&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown-dark:#4a2f1a; --brown-mid:#7a5c3e;
      --brown-light:#c9a87c; --bg:#f5efe6;
      --card:#fffdf5; --line:#e8dcc8; --text:#3e2c1c;
    }
    body {
      background: var(--bg); min-height: 100vh;
      font-family: 'Nanum Myeongjo', serif;
      display: flex; flex-direction: column;
      align-items: center; padding: 40px 20px 80px;
    }
    header { text-align: center; margin-bottom: 28px; }
    header h1 {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 3rem; color: var(--brown-dark); letter-spacing: 4px;
    }
    header p { font-size: 0.88rem; color: var(--brown-mid); margin-top: 4px; }
    .usage-bar {
      width: 100%; max-width: 720px; background: var(--card);
      border-radius: 12px; padding: 12px 20px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 2px 3px 10px rgba(0,0,0,0.07); flex-wrap: wrap; gap: 8px;
    }
    .usage-text { font-size: 0.88rem; color: var(--brown-mid); }
    .usage-count { font-weight: 700; color: var(--brown-dark); }
    .usage-count.low { color: #c0392b; }
    .meta-full {
      width: 100%; max-width: 720px; background: var(--card);
      border-radius: 16px; box-shadow: 3px 5px 18px rgba(0,0,0,0.09);
      padding: 18px 24px; margin-bottom: 18px;
      display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
    }
    .meta-date { font-size: 1rem; font-weight: 700; color: var(--brown-mid); }
    .meta-weather select, .meta-title input {
      background: transparent; border: none;
      border-bottom: 1.5px dashed var(--brown-light);
      font-family: 'Nanum Myeongjo', serif;
      font-size: 0.95rem; color: var(--text); outline: none; padding: 2px 4px;
    }
    .meta-title { flex: 1; min-width: 180px; }
    .meta-title input { width: 100%; }
    .meta-title input::placeholder { color: #c5ae90; }
    .mood-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .mood-row span { font-size: 0.85rem; color: var(--brown-mid); }
    .mood-btn {
      background: none; border: 1.5px solid var(--line);
      border-radius: 50px; padding: 3px 12px;
      font-size: 1.1rem; cursor: pointer; transition: .2s;
    }
    .mood-btn:hover, .mood-btn.on {
      background: var(--brown-light); border-color: var(--brown-light); transform: scale(1.1);
    }
    .diary-wrap {
      width: 100%; max-width: 720px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    }
    .panel {
      background: var(--card); border-radius: 16px;
      box-shadow: 3px 5px 18px rgba(0,0,0,0.09);
      padding: 26px; border-top: 4px solid var(--brown-light); position: relative;
    }
    .panel-label {
      font-size: 0.76rem; font-weight: 700; color: var(--brown-light);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
    }
    .lined::before {
      content: ''; position: absolute; inset: 26px;
      background: repeating-linear-gradient(
        to bottom, transparent, transparent 31px, var(--line) 31px, var(--line) 32px
      );
      pointer-events: none; z-index: 0;
    }
    textarea {
      width: 100%; min-height: 280px; background: transparent; border: none;
      font-size: 1rem; font-family: 'Nanum Myeongjo', serif;
      color: var(--text); line-height: 32px; resize: none; outline: none;
      position: relative; z-index: 1;
    }
    textarea::placeholder { color: #c5ae90; }
    .result-content {
      font-size: 1rem; color: var(--text); line-height: 32px;
      min-height: 280px; white-space: pre-wrap; position: relative; z-index: 1;
    }
    .result-placeholder { color: #c5ae90; font-style: italic; }
    .loading-dots span {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--brown-light); margin: 0 3px; animation: bounce 1.2s infinite;
    }
